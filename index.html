<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Pilates Therapy</title>
  
  <!-- PWA / iPhone App -->
  <link rel="manifest" href="/manifest.json">

  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Studio Pilates">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
</head>
<body>
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email" />
  <br><br>
  <input id="password" type="password" placeholder="Password" />
  <br><br>

  <button onclick="login()">Login</button>

  <p id="loginStatus"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js?v=48-login-fix"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js")
          .then(function () {
            console.log("Service Worker registrato correttamente");
          })
          .catch(function (error) {
            console.log("Errore registrazione Service Worker:", error);
          });
      });
    }
  </script>
  
</body>
</html>
