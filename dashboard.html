<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard Studio Pilates</title>

<style>
body { font-family: Arial; margin:20px; }
input, select { padding:6px; margin:4px; }
button { padding:6px 10px; cursor:pointer; }

table {
  border-collapse: collapse;
  margin-top: 15px;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
}

th { background:#f0f0f0; }

.section { margin-top: 40px; }
.hidden { display: none; }
</style>
</head>

<body>

<h1>Dashboard Studio Pilates</h1>

<button onclick="logout()">Logout</button>

<!-- CLIENTI -->
<div class="section">
<h2>Clienti</h2>

<button onclick="toggleClienti()">Apri / Chiudi</button>

<div id="clientiSection" class="hidden">

<button onclick="loadClienti()">Ricarica Clienti</button>

<br><br>
<input id="new_nome" placeholder="Nome">
<input id="new_cognome" placeholder="Cognome">
<input id="new_telefono" placeholder="Telefono">
<input id="new_email" placeholder="Email">

<button onclick="aggiungiCliente()">Salva Cliente</button>

<div id="outputClienti"></div>

</div>
</div>

<!-- LEZIONI -->
<div class="section">
<h2>Lezioni</h2>

<button onclick="toggleLezioni()">Apri / Chiudi</button>
