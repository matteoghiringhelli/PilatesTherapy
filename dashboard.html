<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Studio Pilates</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
    }

    h1 {
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    #status {
      margin: 12px 0;
      font-weight: bold;
    }

    #debug {
      margin: 12px 0;
      padding: 10px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Dashboard Studio Pilates</h1>

  <div class="actions">
    <button onclick="loadClienti()">Carica Clienti</button>
    <button onclick="logout()">Logout</button>
  </div>

<h2>Aggiungi Cliente</h2>

<input id="new_nome" placeholder="Nome"><br><br>
<input id="new_cognome" placeholder="Cognome"><br><br>
<input id="new_telefono" placeholder="Telefono"><br><br>
<input id="new_email" placeholder="Email"><br><br>

<button onclick="aggiungiCliente()">Salva Cliente</button>
  
  <p id="status"></p>
  <div id="debug"></div>
  <div id="output"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
