<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { font-family: Arial; margin:20px }
table { width:100%; border-collapse: collapse }
th,td { border:1px solid #ccc; padding:6px }
.hidden { display:none }
.section { margin-top:30px }
button { padding:6px 10px }
</style>

</head>
<body>

<h1>Dashboard</h1>

<button onclick="logout()">Logout</button>

<!-- CLIENTI -->
<div class="section">
<h2>Clienti</h2>
<button onclick="toggleClienti()">Apri/Chiudi</button>

<div id="clientiSection" class="hidden">

<input id="new_nome" placeholder="Nome">
<input id="new_cognome" placeholder="Cognome">

<button onclick="aggiungiCliente()">Salva</button>

<div id="outputClienti"></div>
</div>
</div>

<!-- LEZIONI -->
<div class="section">
<h2>Lezioni</h2>
<button onclick="toggleLezioni()">Apri/Chiudi</button>

<div id="lezioniSection" class="hidden">

<input id="new_data" type="date">
<select id="new_ora"></select>

<select id="new_tipologia">
<option>Privata</option>
<option>Duetto</option>
<option>Mini-Gruppo</option>
</select>

<input id="new_istruttore" placeholder="Istruttore">

<button onclick="aggiungiLezione()">Salva</button>

<div id="outputLezioni"></div>
</div>
</div>

<!-- PRENOTAZIONI -->
<div class="section">
<h2>Prenotazioni</h2>
<button onclick="togglePrenotazioni()">Apri/Chiudi</button>

<div id="prenotazioniSection" class="hidden">

<select id="select_cliente"></select>
<select id="select_lezione"></select>

<button onclick="prenota()">Prenota</button>

<div id="outputPrenotazioni"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
