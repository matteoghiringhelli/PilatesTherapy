<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Studio Pilates</title>

<style>

body { font-family: Arial; margin: 15px; }
button { padding: 6px 10px; margin: 3px; }

.hidden { display: none; }

/* ===== TABELLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
}

/* ===== CARD MOBILE ===== */
.card-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 8px;
}

/* MOBILE */
@media (max-width: 768px) {
  table { display: none; }
}

</style>
</head>

<body>

<h1>Dashboard Studio Pilates</h1>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<!-- CLIENTI -->
<h2 onclick="toggleClienti()">Clienti</h2>
<div id="clientiSection" class="hidden">
  <button onclick="loadClienti()">Ricarica</button>
  <div id="outputClienti"></div>
</div>

<!-- LEZIONI -->
<h2 onclick="toggleLezioni()">Lezioni</h2>
<div id="lezioniSection" class="hidden">

  <button onclick="loadLezioni()">Ricarica</button>

  <div id="outputLezioni"></div>

</div>

<!-- PRENOTAZIONI -->
<h2 onclick="togglePrenotazioni()">Prenotazioni</h2>
<div id="prenotazioniSection" class="hidden">

  <button onclick="loadPrenotazioni()">Ricarica</button>

  <select id="select_cliente"></select>
  <select id="select_lezione"></select>
  <button onclick="prenota()">Prenota</button>

  <div id="outputPrenotazioni"></div>

  <h3>Storico Cliente</h3>
  <div id="outputStoricoCliente"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
