<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Studio Pilates</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    input {
      padding: 6px;
      margin: 4px;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
    }

    th {
      background-color: #f0f0f0;
    }

    .section {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<h1>Dashboard Studio Pilates</h1>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<!-- ================= CLIENTI ================= -->

<div class="section">
<h2>Clienti</h2>

<button onclick="loadClienti()">Carica Clienti</button>

<h3>Aggiungi Cliente</h3>

<input id="new_nome" placeholder="Nome">
<input id="new_cognome" placeholder="Cognome">
<input id="new_telefono" placeholder="Telefono">
<input id="new_email" placeholder="Email">
<input id="new_indirizzo" placeholder="Indirizzo">
<input id="new_citta" placeholder="Città">
<input id="new_cap" placeholder="CAP">
<input id="new_cf" placeholder="Codice Fiscale">

<button onclick="aggiungiCliente()">Salva Cliente</button>

<div id="outputClienti"></div>
</div>

<!-- ================= LEZIONI ================= -->

<div class="section">
<h2>Lezioni</h2>

<button onclick="loadLezioni()">Carica Lezioni</button>

<h3>Aggiungi Lezione</h3>

<input id="new_data" type="date">
<input id="new_ora" type="time">
<input id="new_tipologia" placeholder="Tipologia">
<input id="new_istruttore" placeholder="Istruttore">
<input id="new_max" placeholder="Max Partecipanti">

<button onclick="aggiungiLezione()">Salva Lezione</button>

<div id="outputLezioni"></div>
</div>

</body>
</html>
